rembg:
  model: isnet-general-use
  alpha_matting: false
  alpha_matting_foreground_threshold: 240
  alpha_matting_background_threshold: 10
  alpha_matting_erode_size: 10
output:
  size: 800
  format: webp
  quality: 85
  background_color:
  - 255
  - 255
  - 255
padding:
  enabled: true
  percent: 10
autocrop:
  enabled: true
  threshold: 10
enhancement:
  brightness: 1.0
  contrast: 1.0
queue:
  max_concurrent: 1
  max_queue_size: 10
  timeout_seconds: 120
server:
  host: 0.0.0.0
  port: 8010
  log_level: info
