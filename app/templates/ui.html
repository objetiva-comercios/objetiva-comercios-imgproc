<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Standardizer - Config</title>
  <style>
    :root { --bg-primary: #ffffff; --text-primary: #1a1a1a; }
    @media (prefers-color-scheme: dark) {
      :root { --bg-primary: #0f0f0f; --text-primary: #f0f0f0; }
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-primary); color: var(--text-primary); margin: 0; padding: 1rem; }
    .toast { position: fixed; bottom: 1rem; right: 1rem; padding: 0.75rem 1.25rem; border-radius: 6px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.visible { opacity: 1; }
    .toast-success { background: #22c55e; color: #fff; }
    .toast-error { background: #ef4444; color: #fff; }
    #swap-banner { background: #f59e0b; color: #fff; padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
    form { display: grid; gap: 0.75rem; max-width: 600px; }
    label { display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.875rem; }
    input, select { padding: 0.4rem 0.6rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.875rem; }
    button { padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.875rem; background: #3b82f6; color: #fff; }
    button:hover { background: #2563eb; }
    pre { background: #f3f4f6; padding: 1rem; border-radius: 4px; overflow-x: auto; font-size: 0.75rem; }
    #jobs-table { margin-top: 1rem; font-size: 0.8rem; }
    #status-card { margin-bottom: 1rem; font-size: 0.8rem; background: #f9fafb; padding: 0.75rem; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Image Standardizer</h1>
  <div id="status-card"></div>
  <div id="swap-banner" style="display:none">Model swap en progreso...</div>

  <form id="config-form">
    <fieldset>
      <legend>rembg</legend>
      <label>Modelo
        <select id="rembg-model">
          {% for model in valid_models %}
          <option value="{{ model }}" {% if model == config.rembg.model %}selected{% endif %}>{{ model }}</option>
          {% endfor %}
        </select>
      </label>
      <label><input type="checkbox" id="rembg-alpha-matting" {% if config.rembg.alpha_matting %}checked{% endif %}> Alpha matting</label>
      <label>Foreground threshold
        <input type="number" id="am-fg" value="{{ config.rembg.alpha_matting_foreground_threshold }}" min="0" max="255">
      </label>
      <label>Background threshold
        <input type="number" id="am-bg" value="{{ config.rembg.alpha_matting_background_threshold }}" min="0" max="255">
      </label>
      <label>Erode size
        <input type="number" id="am-erode" value="{{ config.rembg.alpha_matting_erode_size }}" min="0">
      </label>
    </fieldset>

    <fieldset>
      <legend>Output</legend>
      <label>Tamano (px)
        <input type="number" id="output-size" value="{{ config.output.size }}" min="1" max="4096">
      </label>
      <label>Calidad WebP (1-100)
        <input type="range" id="output-quality" min="1" max="100" value="{{ config.output.quality }}">
      </label>
      <label>Color de fondo
        <input type="color" id="output-bg-color">
      </label>
    </fieldset>

    <fieldset>
      <legend>Padding</legend>
      <label><input type="checkbox" id="padding-enabled" {% if config.padding.enabled %}checked{% endif %}> Habilitado</label>
      <label>Porcentaje (0-50)
        <input type="range" id="padding-percent" min="0" max="50" value="{{ config.padding.percent }}">
      </label>
    </fieldset>

    <fieldset>
      <legend>Autocrop</legend>
      <label><input type="checkbox" id="autocrop-enabled" {% if config.autocrop.enabled %}checked{% endif %}> Habilitado</label>
      <label>Threshold
        <input type="number" id="autocrop-threshold" value="{{ config.autocrop.threshold }}" min="0" max="255">
      </label>
    </fieldset>

    <fieldset>
      <legend>Enhancement</legend>
      <label>Brillo (0.1-3.0)
        <input type="range" id="enhancement-brightness" min="0.1" max="3.0" step="0.1" value="{{ config.enhancement.brightness }}">
      </label>
      <label>Contraste (0.1-3.0)
        <input type="range" id="enhancement-contrast" min="0.1" max="3.0" step="0.1" value="{{ config.enhancement.contrast }}">
      </label>
    </fieldset>

    <fieldset>
      <legend>Cola</legend>
      <label>Max concurrent
        <input type="number" id="queue-max-concurrent" value="{{ config.queue.max_concurrent }}" min="1">
      </label>
      <label>Max queue size
        <input type="number" id="queue-max-queue-size" value="{{ config.queue.max_queue_size }}" min="1">
      </label>
      <label>Timeout (seg)
        <input type="number" id="queue-timeout" value="{{ config.queue.timeout_seconds }}" min="1">
      </label>
    </fieldset>

    <div style="display:flex;gap:0.5rem;margin-top:0.5rem;">
      <button type="button" id="save-btn" onclick="saveConfig()">Guardar</button>
      <button type="button" id="restore-btn" onclick="restoreDefaults()">Restaurar defaults</button>
      <button type="button" id="yaml-btn" onclick="toggleYaml()">Ver YAML</button>
    </div>
  </form>

  <pre id="yaml-view" style="display:none"></pre>
  <div id="jobs-table"></div>
  <div id="toast" class="toast"></div>

  <script>
    const CONFIG_DEFAULTS = {{ config_defaults | tojson }};

    function rgbArrayToHex(arr) {
      return '#' + arr.map(v => v.toString(16).padStart(2, '0')).join('');
    }
    function hexToRgbArray(hex) {
      const n = parseInt(hex.slice(1), 16);
      return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
    }

    document.getElementById('output-bg-color').value = rgbArrayToHex({{ config.output.background_color | tojson }});

    async function fetchHealth() {
      try {
        const r = await fetch('/health');
        const d = await r.json();
        document.getElementById('status-card').textContent = JSON.stringify(d, null, 2);
        document.getElementById('swap-banner').style.display = d.model_swapping ? 'block' : 'none';
      } catch (e) {}
    }

    async function fetchStatus() {
      try {
        const r = await fetch('/status');
        const d = await r.json();
        document.getElementById('jobs-table').textContent = JSON.stringify(d.job_history?.slice(0, 10), null, 2);
      } catch (e) {}
    }

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast toast-' + type + ' visible';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.className = 'toast'; }, 3000);
    }

    async function saveConfig() {
      const payload = {
        rembg: {
          model: document.getElementById('rembg-model').value,
          alpha_matting: document.getElementById('rembg-alpha-matting').checked,
          alpha_matting_foreground_threshold: parseInt(document.getElementById('am-fg').value),
          alpha_matting_background_threshold: parseInt(document.getElementById('am-bg').value),
          alpha_matting_erode_size: parseInt(document.getElementById('am-erode').value)
        },
        output: {
          size: parseInt(document.getElementById('output-size').value),
          quality: parseInt(document.getElementById('output-quality').value),
          background_color: hexToRgbArray(document.getElementById('output-bg-color').value)
        },
        padding: {
          enabled: document.getElementById('padding-enabled').checked,
          percent: parseInt(document.getElementById('padding-percent').value)
        },
        autocrop: {
          enabled: document.getElementById('autocrop-enabled').checked,
          threshold: parseInt(document.getElementById('autocrop-threshold').value)
        },
        enhancement: {
          brightness: parseFloat(document.getElementById('enhancement-brightness').value),
          contrast: parseFloat(document.getElementById('enhancement-contrast').value)
        },
        queue: {
          max_concurrent: parseInt(document.getElementById('queue-max-concurrent').value),
          max_queue_size: parseInt(document.getElementById('queue-max-queue-size').value),
          timeout_seconds: parseInt(document.getElementById('queue-timeout').value)
        }
      };
      try {
        const r = await fetch('/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (r.ok) {
          showToast('Configuracion guardada', 'success');
        } else {
          const e = await r.json();
          showToast('Error: ' + e.detail, 'error');
        }
      } catch (e) {
        showToast('Error de red', 'error');
      }
    }

    async function restoreDefaults() {
      if (!confirm('Restaurar valores por defecto?')) return;
      try {
        const r = await fetch('/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(CONFIG_DEFAULTS)
        });
        if (r.ok) {
          showToast('Defaults restaurados', 'success');
          location.reload();
        }
      } catch (e) {
        showToast('Error', 'error');
      }
    }

    async function toggleYaml() {
      const el = document.getElementById('yaml-view');
      if (el.style.display === 'none') {
        const r = await fetch('/config');
        const d = await r.json();
        el.textContent = JSON.stringify(d, null, 2);
        el.style.display = 'block';
      } else {
        el.style.display = 'none';
      }
    }

    fetchHealth();
    fetchStatus();
    setInterval(fetchHealth, 5000);
    setInterval(fetchStatus, 5000);
  </script>
</body>
</html>
